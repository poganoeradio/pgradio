<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization — Poganoe Radio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            text-align: center;
            max-width: 500px;
            padding: 40px;
        }
        .card img {
            width: 80px;
            height: 80px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; color: #fff; margin-bottom: 12px; }
        p { color: #999; margin-bottom: 16px; }
        code {
            display: block;
            background: #222;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-size: 13px;
            color: #4fc3f7;
            margin: 16px 0;
        }
        a { color: #4fc3f7; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" alt="Poganoe Radio">
        <h1>TikTok Authorization</h1>
        <p>Authorization successful. You can close this window.</p>
        <p id="auth-code" style="display:none;">Authorization code:</p>
        <code id="code-display" style="display:none;"></code>
        <p><a href="/">Back to Home</a></p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        if (code) {
            document.getElementById('auth-code').style.display = 'block';
            document.getElementById('code-display').style.display = 'block';
            document.getElementById('code-display').textContent = code;
        }
    </script>
</body>
</html>
